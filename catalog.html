<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Catálogo — CDS Criativos da Stephannie</title>
  <meta name="description" content="Catálogo completo de presentes e brindes personalizados. Nécessaires, kits, chaveiros, porta batom e muito mais." />
  <meta name="theme-color" content="#100A03" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-cds-dark text-cds-cream font-sans min-h-screen">

  <!-- Navbar simples -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-cds-dark/90 backdrop-blur-xl border-b border-cds-gold/10">
    <div class="max-w-7xl mx-auto px-6 lg:px-12 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 group">
        <img src="/gold-submarca.png" alt="CDS — Criativos da Stephannie"
             class="h-11 w-auto transition-opacity duration-300 group-hover:opacity-80" />
        <div class="leading-tight">
          <span class="font-serif text-base font-semibold text-cds-white">CDS</span>
          <span class="block text-[9px] text-cds-gold/60 tracking-[0.18em] uppercase">Criativos da Stephannie</span>
        </div>
      </a>
      <div class="flex items-center gap-4">
        <a href="/" class="text-cds-nude/60 hover:text-cds-gold transition-colors text-sm">← Início</a>
        <a href="https://wa.me/5513991348559?text=Olá!%20Gostaria%20de%20fazer%20um%20orçamento." target="_blank" rel="noopener"
           class="btn-gold px-4 py-2 rounded-full text-xs font-semibold">Pedir orçamento</a>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="pt-32 pb-12 px-6">
    <div class="max-w-7xl mx-auto">
      <span class="product-tag mb-4 inline-block">Catálogo completo</span>
      <h1 class="font-serif text-4xl md:text-5xl font-bold text-cds-white mb-4">
        Todos os <em class="gold-text">produtos</em>
      </h1>
      <p class="text-cds-nude/60 max-w-lg">Cada peça é feita com carinho, pensada para encantar quem recebe e valorizar quem presenteia.</p>
    </div>
  </header>

  <!-- Filtros sticky -->
  <div class="sticky top-16 z-40 bg-cds-dark/95 backdrop-blur-xl border-b border-cds-gold/10">
    <div class="max-w-7xl mx-auto px-6 py-3">
      <div id="catalog-filters">
        <!-- Renderizado pelo JS (inclui search e contador) -->
      </div>
    </div>
  </div>
  <div class="mb-6"></div>

  <!-- Grid -->
  <main class="px-6 pb-20">
    <div class="max-w-7xl mx-auto">
      <div id="catalog-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <!-- Renderizado pelo JS -->
      </div>
      <div id="catalog-pagination"></div>
    </div>
  </main>

  <!-- Footer simples -->
  <footer class="border-t border-cds-gold/10 py-8 px-6 text-center text-cds-nude/30 text-xs">
    © 2025 CDS — Criativos da Stephannie.
    <a href="https://instagram.com/criativosdastephannie" target="_blank" rel="noopener"
       class="text-cds-gold/50 hover:text-cds-gold transition-colors ml-2">@criativosdastephannie</a>
  </footer>

  <script type="module" src="/src/catalog/main.js"></script>
</body>
</html>
